<!-- Dependent dropdown AJAX (only fires when #id_country / #id_state exist) -->
<script>
(function($){
    var statesUrl  = "{% url 'ajax_load_states' %}";
    var citiesUrl  = "{% url 'ajax_load_cities' %}";

    $("#id_country").on("change", function(){
        var countryId = $(this).val();
        $.get(statesUrl, {country_id: countryId}, function(data){
            $("#id_state").html(data);
            $("#id_city").html("<option value=''>---------</option>");
        });
    });

    $("#id_state").on("change", function(){
        var stateId = $(this).val();
        $.get(citiesUrl, {state_id: stateId}, function(data){
            $("#id_city").html(data);
        });
    });
}(jQuery));
</script>

<!-- SweetAlert2 -->
<script src="{% static 'js/sweetalert2.all.min.js' %}"></script>

<!-- Flash messages via SweetAlert -->
{% for message in messages %}
<script>
Swal.fire({
    position: 'center',
    icon: '{{ message.tags|default:"info" }}',
    title: '{{ message|escapejs }}',
    showConfirmButton: true,
    timer: 5000
});
</script>
{% endfor %}

<!-- Dashboard charts (only rendered when chart data is in context) -->
{% if label_item is not None %}
<script src="{% static 'js/all.js' %}"></script>
<script>
"use strict";
!function(NioApp, $){
    "use strict";

    /* ── Bar charts ── */
    var barChartData = {
        labels: {{ labels|safe }},
        dataUnit: 'Issued',
        datasets: [{ color: "#b695ff", data: {{ issue_data|safe }} }]
    };
    var barItemData = {
        labels: {{ label_item|safe }},
        dataUnit: 'Issued',
        datasets: [{ color: "#b695ff", data: {{ issue_data|safe }} }]
    };

    function barChart(selector, set_data){
        var $sel = selector ? $(selector) : $(".bar-chart");
        $sel.each(function(){
            var id = $(this).attr("id");
            var d  = typeof set_data === "undefined" ? eval(id) : set_data;
            var ctx = document.getElementById(id);
            if(!ctx) return;
            var chart_data = d.datasets.map(function(ds){
                return { label: ds.label, data: ds.data,
                    backgroundColor: ds.color, borderWidth: 2,
                    borderColor: "transparent", hoverBorderColor: "transparent",
                    borderSkipped: "bottom", barPercentage: .6, categoryPercentage: .7 };
            });
            new Chart(ctx.getContext("2d"), {
                type: "bar",
                data: { labels: d.labels, datasets: chart_data },
                options: {
                    legend: { display: false },
                    maintainAspectRatio: false,
                    scales: {
                        yAxes: [{ ticks: { beginAtZero: true, fontSize: 12, fontColor: "#9eaecf" },
                            gridLines: { color: NioApp.hexRGB("#526484",.2), tickMarkLength: 0, zeroLineColor: NioApp.hexRGB("#526484",.2) } }],
                        xAxes: [{ ticks: { fontSize: 12, fontColor: "#9eaecf" },
                            gridLines: { color: "transparent", tickMarkLength: 10, zeroLineColor: "transparent" } }]
                    }
                }
            });
        });
    }
    barChart();

    /* ── Line charts ── */
    var solidLineChart = {
        labels: {{ label_item|safe }}, dataUnit: "Items", lineTension: .4, legend: true,
        datasets: [
            { label: "Total Items",     color: "#5ce0aa", background: "transparent", data: {{ data|safe }} },
            { label: "Recently Issued", color: "#9d72ff", background: "transparent", data: {{ issue_data|safe }} }
        ]
    };
    var solidDataChart = {
        labels: {{ label_item|safe }}, dataUnit: "Items", lineTension: .4, legend: true,
        datasets: [
            { label: "Total Items",        color: "#5ce0aa", background: "transparent", data: {{ data|safe }} },
            { label: "Recently Received",  color: "#9d72ff", background: "transparent", data: {{ receive_data|safe }} }
        ]
    };

    function lineChart(selector, set_data){
        var $sel = selector ? $(selector) : $(".line-chart");
        $sel.each(function(){
            var id = $(this).attr("id");
            var d  = typeof set_data === "undefined" ? eval(id) : set_data;
            var ctx = document.getElementById(id);
            if(!ctx) return;
            var chart_data = d.datasets.map(function(ds){
                return { label: ds.label, tension: d.lineTension,
                    backgroundColor: ds.background, borderWidth: 2,
                    borderColor: ds.color, pointBorderColor: ds.color,
                    pointBackgroundColor: "#fff", pointHoverBackgroundColor: "#fff",
                    pointHoverBorderColor: ds.color, pointBorderWidth: 2,
                    pointHoverRadius: 4, pointRadius: 4, pointHitRadius: 4, data: ds.data };
            });
            new Chart(ctx.getContext("2d"), {
                type: "line",
                data: { labels: d.labels, datasets: chart_data },
                options: {
                    legend: { display: d.legend || false, labels: { boxWidth: 12, padding: 20, fontColor: "#6783b8" } },
                    maintainAspectRatio: false,
                    scales: {
                        yAxes: [{ ticks: { beginAtZero: false, fontSize: 12, fontColor: "#9eaecf", padding: 10 },
                            gridLines: { color: NioApp.hexRGB("#526484",.2), tickMarkLength: 0, zeroLineColor: NioApp.hexRGB("#526484",.2) } }],
                        xAxes: [{ ticks: { fontSize: 12, fontColor: "#9eaecf", padding: 5 },
                            gridLines: { color: "transparent", tickMarkLength: 10, zeroLineColor: NioApp.hexRGB("#526484",.2), offsetGridLines: true } }]
                    }
                }
            });
        });
    }
    lineChart();

    /* ── Pie / bar category chart ── */
    var pieItemData = {
        labels: {{ labels|safe }}, dataUnit: "items", legend: false,
        datasets: [{ borderColor: "#fff", background: ["#b695ff","#f4aaa4","#8feac5","#2c3782","#20c997"], data: {{ data|safe }} }]
    };

    function pieChart(selector, set_data){
        var $sel = selector ? $(selector) : $(".pie-chart");
        $sel.each(function(){
            var id = $(this).attr("id");
            var d  = typeof set_data === "undefined" ? eval(id) : set_data;
            var ctx = document.getElementById(id);
            if(!ctx) return;
            var chart_data = d.datasets.map(function(ds){
                return { backgroundColor: ds.background, borderWidth: 2,
                    borderColor: ds.borderColor, hoverBorderColor: ds.borderColor, data: ds.data };
            });
            new Chart(ctx.getContext("2d"), {
                type: "bar",
                data: { labels: d.labels, datasets: chart_data },
                options: { legend: { display: false }, maintainAspectRatio: false }
            });
        });
    }
    pieChart();

    /* ── Doughnut charts ── */
    var doughnutChartData = {
        labels: {{ labels|safe }}, dataUnit: "Received", legend: false,
        datasets: [{ borderColor: "#fff", background: ["#b695ff","#f4aaa4","#2c3782","#20c997"], data: {{ receive_data|safe }} }]
    };
    var doughnutItemData = {
        labels: {{ label_item|safe }}, dataUnit: "Received", legend: false,
        datasets: [{ borderColor: "#fff", background: ["#b695ff","#f4aaa4","#2c3782","#20c997"], data: {{ receive_data|safe }} }]
    };

    function doughnutChart(selector, set_data){
        var $sel = selector ? $(selector) : $(".doughnut-chart");
        $sel.each(function(){
            var id = $(this).attr("id");
            var d  = typeof set_data === "undefined" ? eval(id) : set_data;
            var ctx = document.getElementById(id);
            if(!ctx) return;
            var chart_data = d.datasets.map(function(ds){
                return { backgroundColor: ds.background, borderWidth: 2,
                    borderColor: ds.borderColor, hoverBorderColor: ds.borderColor, data: ds.data };
            });
            new Chart(ctx.getContext("2d"), {
                type: "doughnut",
                data: { labels: d.labels, datasets: chart_data },
                options: { legend: { display: false }, rotation: 1, cutoutPercentage: 40, maintainAspectRatio: false }
            });
        });
    }
    doughnutChart();

}(NioApp, jQuery);
</script>
{% endif %}

<!-- Active nav highlight -->
<script>
(function(){
    var cur = window.location.href;
    $(".nk-menu-link, .menu-link, .nav-link").each(function(){
        if(cur === this.href){
            $(this).closest("li").addClass("active").parent().closest("li").addClass("active");
        }
    });
}());
</script>
